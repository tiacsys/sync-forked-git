name: Sync Sphinx Forks

on:
  schedule: # At 01:05.
    - cron: '5 1 * * *'
  workflow_dispatch: # And manually on button click.

jobs:
  attakei-git-sync:
    name: Sync Kazuya Takei

    uses: tiacsys/github-workflows/.github/workflows/git-sync.yml@v2
    with:
      matrix: ./.github/git-sync-sphinx-attakei.yaml
      secret-prefix: "SSH_PRIVATE_KEY_"
    secrets: inherit # pass all secrets

  attakei-git-rebase:
    name: Rebase Kazuya Takei

    needs:
      - attakei-git-sync

    uses: tiacsys/github-workflows/.github/workflows/git-rebase.yml@v2
    with:
      matrix: ./.github/git-rebase-sphinx-attakei.yaml
      secret-prefix: "SSH_PRIVATE_KEY_"
      refspec-prefix: "toctree"
    secrets: inherit # pass all secrets
