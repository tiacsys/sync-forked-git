name: Sync Zephyr Project Forks

on:
  schedule: # At minute 0 past every 4th hour.
    - cron: '0 */4 * * *'
  workflow_dispatch: # And manually on button click.

jobs:
  zephyr-git-sync:
    name: Sync Zephyr
    runs-on: ubuntu-latest

    strategy:
      matrix:
        org:
          - "${{ vars.BASE_URI_GH_TIACSYS_PRIVATE }}"
        repo:
          - zephyr
        branch:
          - collab-hwm
          - collab-safety
          - collab-sca
          - collab-sdk-dev
          - main
          - v4.4-branch
          - v4.3-branch
          - v4.2-branch
          - v4.1-branch
          - v4.0-branch
          - v3.7-branch
          - v3.6-branch
          - v3.5-branch
          - v3.4-branch
          - v3.3-branch
          - v3.2-branch
          - v3.1-branch
          - v3.0-branch
          - v2.7-auditable-branch
          - v2.7-branch
          - v2.6-branch
          - v2.5-branch
          - v2.4-branch
          - v2.3-branch
          - v2.2-branch
          - v2.1-branch
          - v2.0-branch
          - v1.14-branch
          - v1.13-branch
          - v1.12-branch
          - v1.11-branch
          - v1.10-branch
          - v1.9-branch
          - v1.8-branch
          - v1.7-branch
          - v1.6-branch
          - v1.5-branch
          - "refs/tags/*"

    steps:
      - name: Generate Secret String
        run: |
          varname_prefix="SSH_PRIVATE_KEY_"
          varname_unique="$(echo '${{ matrix.repo }}' | tr '[:punct:]' '_' | tr '[:lower:]' '[:upper:]')"
          varname_suffix=""
          varname=${varname_prefix}${varname_unique}${varname_suffix}
          echo "SECRET_STRING=${varname}" >> $GITHUB_ENV

      - name: Sync Git Refspecs
        uses: tiacsys/git-sync@v3
        with:
          source_repo: "${{ vars.BASE_URI_GH_ZEPHYR_PROJECT_PUBLIC }}/${{ matrix.repo }}.git"
          source_branch: "${{ matrix.branch }}"
          destination_repo: "${{ matrix.org }}/${{ matrix.repo }}.git"
          destination_branch: "${{ matrix.branch }}"
          ssh_private_key: "${{ secrets[env.SECRET_STRING] }}"

  zephyr-git-rebase:
    name: Rebase Zephyr
    runs-on: ubuntu-latest

    needs: zephyr-git-sync

    strategy:
      matrix:
        org:
          - "${{ vars.BASE_URI_GH_TIACSYS_PRIVATE }}"
        repo:
          - zephyr
        branch:
          - main
          - v4.4-branch
          - v4.3-branch
          - v4.2-branch
          - v4.1-branch
          - v4.0-branch
          - v3.7-branch
          - v3.6-branch
          - v3.5-branch
          - v3.4-branch
          - v3.3-branch
          - v3.2-branch
          - v3.1-branch
          - v3.0-branch
          - v2.7-branch
          - v2.6-branch
          - v2.5-branch

    steps:
      - name: Generate Secret String
        run: |
          varname_prefix="SSH_PRIVATE_KEY_"
          varname_unique="$(echo '${{ matrix.repo }}' | tr '[:punct:]' '_' | tr '[:lower:]' '[:upper:]')"
          varname_suffix=""
          varname=${varname_prefix}${varname_unique}${varname_suffix}
          echo "SECRET_STRING=${varname}" >> $GITHUB_ENV

      - name: Generate Prefix String
        run: |
          varname_prefix="GIT_REBASE_"
          varname_unique="$(echo '${{ matrix.org }}' | tr '[:punct:]' '_' | tr '[:lower:]' '[:upper:]')"
          varname_suffix="_BRANCH_PREFIX"
          varname=${varname_prefix}${varname_unique}${varname_suffix}
          echo "PREFIX_STRING=${varname}" >> $GITHUB_ENV

      - name: Rebase Custodians
        uses: tiacsys/git-rebase@v1
        with:
          repo: "${{ matrix.org }}/${{ matrix.repo }}.git"
          source_branch: "${{ vars[env.PREFIX_STRING] }}/${{ matrix.branch }}"
          destination_branch: "${{ matrix.branch }}"
          ssh_private_key: "${{ secrets[env.SECRET_STRING] }}"
